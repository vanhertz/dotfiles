# Fonts
font_family MesloLGS NF

#font_family      Maple Mono Regular
#bold_font        Maple Mono Bold
#italic_font      Maple Mono Italic
#bold_italic_font Maple Mono BoldItalic

font_size 11.0

enable_audio_bell no
window_padding_width 10
confirm_os_window_close 0
hide_window_decorations yes
background_opacity 0.95

# The basic colors
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color  #1E1E2E
macos_titlebar_color    #1E1E2E

# Tab bar colors
tab_bar_style powerline
tab_powerline_style round
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8

linux_display_server wayland

map super+shift+enter       new_os_window_with_cwd

# Seleccionar por palabras en la línea de comandos de Zsh
map ctrl+shift+left         send_text all \x1b[1;6D
map ctrl+shift+right        send_text all \x1b[1;6C

# Seleccionar carácter por carácter en la línea de comandos de Zsh
map shift+left              send_text all \x1b[1;2D
map shift+right             send_text all \x1b[1;2C

# Copiar selecciones de Kitty y delegar la selección de la línea a Zsh
map ctrl+shift+c             combine : copy_to_clipboard : send_text all \x18c
map ctrl+shift+v             paste_from_clipboard

# Conservar la navegación entre pestañas con otras teclas
map ctrl+shift+page_up      previous_tab
map ctrl+shift+page_down    next_tab
